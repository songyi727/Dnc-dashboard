name: DNC 매출 리포트 자동 발송

on:
  push:
    paths:
      - 'report_data.json'  # report_data.json 변경될 때만 실행
  workflow_dispatch:  # 수동 실행 버튼 (테스트용)

jobs:
  send-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas openpyxl

      - name: 30분 대기 (데이터 안정화)
        run: |
          echo "⏳ report_data.json 업데이트 감지! 30분 후 메일 발송합니다..."
          sleep 1800

      - name: 최신 데이터로 재체크아웃
        uses: actions/checkout@v4

      - name: Generate and send report
        env:
          GMAIL_USER:     ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          RECV_EMAIL:     ${{ secrets.RECV_EMAIL }}
          DASHBOARD_URL:  https://songyi727.github.io/Dnc-dashboard/
        run: python send_report.py
