name: DNC 매출 리포트 자동 발송

on:
  workflow_dispatch:  # update_dashboard.py에서 자동 트리거

jobs:
  send-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas openpyxl

      - name: 30분 대기 (데이터 안정화)
        run: |
          echo "⏳ 데이터 업데이트 감지! 30분 후 메일 발송합니다..."
          sleep 1800

      - name: 최신 데이터로 재체크아웃
        uses: actions/checkout@v4

      - name: Generate and send report
        env:
          GMAIL_USER:     ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          RECV_EMAIL:     ${{ secrets.RECV_EMAIL }}
          DASHBOARD_URL:  https://songyi727.github.io/Dnc-dashboard/
        run: python send_report.py
