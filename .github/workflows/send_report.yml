name: DNC 매출 리포트 자동 발송
 
on:
  schedule:
    - cron: '3 1 * * *'  # 매일 오전 10:03 KST (UTC 01:03)
  workflow_dispatch:  # 수동 실행 버튼 (테스트용)
  push:
    branches: [main]     # ← 이 줄 추가 (push할 때마다 실행)
 
jobs:
  send-email:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Install dependencies
        run: pip install pandas openpyxl
 
      - name: Show trigger info  # 오류 찾기용
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          date -u
          TZ=Asia/Seoul date

      - name: Generate and send report
        env:
          GMAIL_USER:     ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          RECV_EMAIL:     ${{ secrets.RECV_EMAIL }}
          DASHBOARD_URL:  https://songyi727.github.io/Dnc-dashboard/
        run: python send_report.py
